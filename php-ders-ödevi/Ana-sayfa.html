<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colombia Coffee - Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="kahve-sayfası.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

    <header>
        <div class="logo">
            <img src="icon.png" alt="Colombia Coffee Logo"> 
        </div>
        
        <div class="right-menu">
            <nav id="navbar">
                <a href="#" class="nav-link">Ana Sayfa</a>
                <a href="#" class="nav-link">Kurumsal</a>
                <a href="#" class="nav-link active">Menü</a>
                <a href="#" class="nav-link">İletişim</a>
            </nav>
            <div class="lang-search">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" alt="TR">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-text">
            <h1>Ürünler</h1>
            <p>Colombia Coffee -- Ürünler --</p>
            
            <div class="slider-indicators">
                <div class="indicator active" onclick="goToSlide(0)">
                    <span>01</span><div class="line"></div>
                </div>
                <div class="indicator" onclick="goToSlide(1)">
                    <span>02</span><div class="line"></div>
                </div>
                <div class="indicator" onclick="goToSlide(2)">
                    <span>03</span><div class="line"></div>
                </div>
                <div class="indicator" onclick="goToSlide(3)">
                    <span>04</span><div class="line"></div>
                </div>
            </div>
        </div>

        <div class="slider-container">
            <div class="slider-track" id="sliderTrack">
                <div class="slide" style="background-image: url('dukkangorsel1.jpg');"></div>
                <div class="slide" style="background-image: url('dukkangorsel2.jpg');"></div>
                <div class="slide" style="background-image: url('dukkangorsel3.jpg');"></div>
                <div class="slide" style="background-image: url('dukkangorsel4.jpg');"></div>
            </div>
        </div>
    </section>

    <div class="toggle-section">
        <button id="btnKahveler" class="toggle-btn btn-active" onclick="switchTab('kahveler')">KAHVELER</button>
        <button id="btnKupalar" class="toggle-btn btn-inactive" onclick="switchTab('kupalar')">KUPALAR</button>
    </div>

    <section class="products-grid" id="kahveler-grid">
        <div class="product-card">
            <img src="frappe.png" alt="Espresso Frappe" class="product-img">
            <h3 class="product-title">Espresso Frappe</h3>
            <div class="product-price">₺115.00</div>
        </div>
        <div class="product-card">
            <img src="flatwhite.png" alt="Flat White" class="product-img">
            <h3 class="product-title">Flat White</h3>
            <div class="product-price">₺95.00</div>
        </div>
        <div class="product-card">
            <img src="equinoks.png" alt="Equinoks" class="product-img">
            <h3 class="product-title">Equinoks</h3>
            <div class="product-price">₺125.00</div>
        </div>
        <div class="product-card">
            <img src="salep.png" alt="Salep" class="product-img">
            <h3 class="product-title">Salep</h3>
            <div class="product-price">₺105.00</div>
        </div>
        <div class="product-card">
            <img src="espresso.png" alt="Espresso" class="product-img">
            <h3 class="product-title">Espresso</h3>
            <div class="product-price">₺70.00</div>
        </div>
        <div class="product-card">
            <img src="nirvana.png" alt="NIRVANA" class="product-img">
            <h3 class="product-title">NIRVANA</h3>
            <div class="product-price">₺130.00</div>
        </div>
    </section>

    <section class="products-grid" id="kupalar-grid">
        <div class="product-card">
            <img src="kupa1.png" alt="Yeşil Seramik Kupa" class="product-img">
            <h3 class="product-title">Yeşil Seramik Kupa</h3>
            <div class="product-price">₺250.00</div>
        </div>
        <div class="product-card">
            <img src="kupa2.png" alt="Termos Bardak" class="product-img">
            <h3 class="product-title">Termos Bardak</h3>
            <div class="product-price">₺450.00</div>
        </div>
        <div class="product-card">
            <img src="kupa3.png" alt="Cam Kupa" class="product-img">
            <h3 class="product-title">Cam Kupa</h3>
            <div class="product-price">₺180.00</div>
        </div>
    </section>
    <script src="kahve-sayfası.js"></script>
</body>
</html>
